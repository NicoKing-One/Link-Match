<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>连连看 MVP</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell" aria-live="polite">
      <section class="screen screen-start active" id="startScreen">
        <div class="brand-panel">
          <p class="eyebrow">Link Match</p>
          <h1>连连看</h1>
        </div>

        <div class="level-list" id="levelList" aria-label="选择难度"></div>

        <div class="stamina-panel">
          <div>
            <span>体力</span>
            <strong class="staminaText">50/50</strong>
            <small class="staminaCountdown">恢复 03:00</small>
          </div>
          <button class="meta-button getStaminaButton" type="button">获取体力</button>
        </div>

        <button class="primary-button" id="startButton" type="button">开始游戏</button>
      </section>

      <section
        class="screen screen-game draft-three-shell"
        id="gameScreen"
        data-visual-target="docs/ui-design-drafts/ui-design-draft-03.png"
      >
        <header class="top-panel organic-hud-frame">
          <div class="stage-banner">
            <strong id="levelName">第01关</strong>
            <button class="icon-button" id="gameHomeButton" type="button" aria-label="返回首页">
              <img class="home-art" src="./assets/ui-cut/home-button.png" alt="" aria-hidden="true" />
            </button>
          </div>

          <div class="hud">
            <div class="hud-item hud-item--time">
              <span class="hud-title-row">
                <img class="hud-icon" src="./assets/ui-cut/hud-clock.png" alt="" aria-hidden="true" />
                <span class="hud-label">时间</span>
              </span>
              <strong id="timeText">00:00</strong>
            </div>
            <div class="hud-item hud-item--remaining">
              <span class="hud-title-row">
                <img class="hud-icon" src="./assets/ui-cut/hud-remaining.png" alt="" aria-hidden="true" />
                <span class="hud-label">剩余</span>
              </span>
              <strong id="remainingText">0</strong>
            </div>
            <div class="hud-item hud-item--score">
              <span class="hud-title-row">
                <img class="hud-icon" src="./assets/ui-cut/hud-score-star.png" alt="" aria-hidden="true" />
                <span class="hud-label">得分</span>
              </span>
              <strong id="scoreText">0</strong>
            </div>
            <div class="hud-item hud-item--stamina stamina-hud">
              <span class="hud-title-row">
                <img class="hud-icon" src="./assets/ui-cut/hud-heart.png" alt="" aria-hidden="true" />
                <span class="hud-label">体力</span>
              </span>
              <strong class="staminaText">50/50</strong>
            </div>
          </div>

        </header>

        <section class="board-wrap glass-board-frame">
          <div class="toast" id="toast" role="status" aria-live="polite"></div>
          <div class="board" id="board" aria-label="连连看棋盘"></div>
          <svg class="link-layer" id="linkLayer" aria-hidden="true"></svg>
        </section>

        <footer class="toolbar cream-tool-tray">
          <button class="tool-button tool-button--hint" id="hintButton" type="button">
            <img class="tool-art" src="./assets/ui-cut/tool-hint.png" alt="" aria-hidden="true" />
            <span class="tool-label">提示</span>
            <span class="tool-count" id="hintCount">0</span>
          </button>
          <button class="tool-button tool-button--shuffle" id="shuffleButton" type="button">
            <img class="tool-art" src="./assets/ui-cut/tool-shuffle.png" alt="" aria-hidden="true" />
            <span class="tool-label">洗牌</span>
            <span class="tool-count" id="shuffleCount">0</span>
          </button>
          <button class="tool-button tool-button--pause" id="pauseButton" type="button">
            <img class="tool-art" src="./assets/ui-cut/tool-pause.png" alt="" aria-hidden="true" />
            <span class="tool-label">暂停</span>
          </button>
        </footer>
      </section>

      <section
        class="screen screen-result mobile-result-shell"
        id="resultScreen"
        data-visual-target="docs/ui-design-drafts/mobile-modal-result-design.png"
      >
        <div class="result-card candy-result-card">
          <div class="result-plaque" aria-hidden="true">
            <span class="plaque-level-label">第01关</span>
          </div>
          <div class="result-badge" aria-hidden="true">
            <img class="result-badge-art" id="resultBadgeArt" src="./assets/ui-cut/best-crown.png" alt="" />
          </div>
          <h2 id="resultTitle">通关成功</h2>
          <p id="resultSummary" aria-hidden="true"></p>
          <div class="result-stars" id="resultStars" aria-label="鑾峰緱鏄熸槦"></div>
          <div class="result-stats">
            <span id="resultScore">得分 0</span>
            <span id="resultBest">最佳 0</span>
          </div>
          <button class="primary-button" id="againButton" type="button">再玩一局</button>
          <button class="ghost-button" id="homeButton" type="button">返回首页</button>
        </div>
      </section>
    </main>

    <div
      class="modal hidden mobile-modal"
      id="pauseModal"
      role="dialog"
      aria-modal="true"
      aria-labelledby="pauseTitle"
      data-visual-target="docs/ui-design-drafts/mobile-modal-result-design.png"
    >
      <div class="modal-card candy-modal-card">
        <div class="modal-plaque" aria-hidden="true">
          <span class="plaque-level-label">第01关</span>
        </div>
        <div class="modal-icon modal-icon--pause" aria-hidden="true">
          <img class="modal-icon-art" src="./assets/ui-cut/tool-pause.png" alt="" />
        </div>
        <h2 id="pauseTitle">游戏暂停</h2>
        <p>棋盘状态已经保留，继续后倒计时恢复。</p>
        <div class="modal-actions">
          <button class="primary-button" id="resumeButton" type="button">继续游戏</button>
          <button class="ghost-button" id="pauseRestartButton" type="button">重新开始</button>
          <button class="ghost-button" id="pauseHomeButton" type="button">返回首页</button>
        </div>
      </div>
    </div>

    <div
      class="modal hidden mobile-modal"
      id="toolModal"
      role="dialog"
      aria-modal="true"
      aria-labelledby="toolTitle"
      data-visual-target="docs/ui-design-drafts/mobile-modal-result-design.png"
    >
      <div class="modal-card candy-modal-card">
        <div class="modal-plaque" aria-hidden="true">
          <span class="plaque-level-label">第01关</span>
        </div>
        <div class="modal-icon modal-icon--tool" aria-hidden="true">
          <img class="modal-icon-art" id="toolModalIcon" src="./assets/ui-cut/tool-hint.png" alt="" />
        </div>
        <h2 id="toolTitle">道具用完了</h2>
        <p id="toolMessage">可以看广告获取，或购买更多道具。</p>
        <div class="modal-actions">
          <button class="primary-button" id="watchAdButton" type="button">看广告获取</button>
          <button class="ghost-button" id="buyToolButton" type="button">购买</button>
          <button class="ghost-button" id="toolCloseButton" type="button">继续游戏</button>
        </div>
      </div>
    </div>

    <div
      class="modal hidden mobile-modal"
      id="exitModal"
      role="dialog"
      aria-modal="true"
      aria-labelledby="exitTitle"
      data-visual-target="docs/ui-design-drafts/mobile-modal-result-design.png"
    >
      <div class="modal-card candy-modal-card">
        <div class="modal-plaque" aria-hidden="true">
          <span class="plaque-level-label">第01关</span>
        </div>
        <div class="modal-icon modal-icon--exit" aria-hidden="true">
          <img class="modal-icon-art" src="./assets/ui-cut/home-button.png" alt="" />
        </div>
        <h2 id="exitTitle">离开本局？</h2>
        <p>当前棋盘会停止计时，你可以返回首页，也可以直接重新开始。</p>
        <div class="modal-actions">
          <button class="primary-button" id="confirmHomeButton" type="button">返回首页</button>
          <button class="ghost-button" id="confirmRestartButton" type="button">重新开始</button>
          <button class="ghost-button" id="exitCancelButton" type="button">继续游戏</button>
        </div>
      </div>
    </div>

    <div
      class="modal hidden mobile-modal"
      id="staminaModal"
      role="dialog"
      aria-modal="true"
      aria-labelledby="staminaTitle"
      data-visual-target="docs/ui-design-drafts/mobile-modal-result-design.png"
    >
      <div class="modal-card candy-modal-card">
        <div class="modal-plaque" aria-hidden="true">
          <span class="plaque-level-label">第01关</span>
        </div>
        <div class="modal-icon modal-icon--stamina" aria-hidden="true">
          <img class="modal-icon-art" src="./assets/ui-cut/hud-heart.png" alt="" />
        </div>
        <h2 id="staminaTitle">体力不足</h2>
        <p id="staminaMessage">看广告或购买可以获得 30 点体力，广告最多获取 3 次。</p>
        <div class="modal-actions">
          <button class="primary-button" id="staminaAdButton" type="button">看广告获取体力</button>
          <button class="ghost-button" id="staminaBuyButton" type="button">购买体力</button>
          <button class="ghost-button" id="staminaCloseButton" type="button">稍后再说</button>
        </div>
      </div>
    </div>

    <script type="module" src="./game.js"></script>
  </body>
</html>
